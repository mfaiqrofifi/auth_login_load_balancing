services:
  swagger-ui:
    image: swaggerapi/swagger-ui:v5.17.14
    restart: unless-stopped
    ports:
      - "8090:8080"
    volumes:
      - ./docs/openapi.yaml:/usr/share/nginx/html/openapi.yaml:ro
      - ./docs/swagger-ui/swagger-initializer.js:/usr/share/nginx/html/swagger-initializer.js:ro
